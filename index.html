<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickForge - FB Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen py-8">
<div class="max-w-4xl mx-auto px-4">
  <h1 class="text-4xl font-bold text-white text-center mb-8">🎨 ClickForge</h1>
  <p class="text-white text-center mb-8">Facebook Preview Tool</p>

  <div class="bg-white rounded-3xl shadow-2xl p-8">
    <input id="baseUrl" type="url" placeholder="Base Long URL" class="w-full p-4 border rounded-2xl mb-6 text-lg">

    <input id="imageUrl" type="url" placeholder="Image URL daalein" class="w-full p-4 border rounded-2xl mb-6 text-lg">

    <button onclick="generateLink()" 
            class="w-full bg-gradient-to-r from-pink-600 to-purple-600 text-white py-4 rounded-2xl font-bold text-lg">
      🚀 Generate FB Preview Link
    </button>
  </div>

  <div id="result" class="mt-10"></div>
</div>

<script>
function generateLink() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const imageUrl = document.getElementById('imageUrl').value.trim();

  if (!baseUrl || !imageUrl) {
    alert("Base URL aur Image URL dono daalein!");
    return;
  }

  const code = Math.random().toString(36).substring(2, 10);
  const shortLink = `https://three-ashy.vercel.app/preview/\( {code}?url= \){encodeURIComponent(baseUrl)}&img=${encodeURIComponent(imageUrl)}`;

  const html = `
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <p class="font-bold mb-2">Your FB Preview Link:</p>
      <a href="\( {shortLink}" target="_blank" class="text-blue-600 font-medium break-all block"> \){shortLink}</a>
      <p class="text-sm text-gray-500 mt-4">Is link ko Facebook/WhatsApp pe share karo — Image preview aayega</p>
    </div>
  `;

  document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
