<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen py-8">
<div class="max-w-4xl mx-auto px-4">
  <h1 class="text-4xl font-bold text-white text-center mb-8">🎨 ClickForge</h1>

  <div class="bg-white rounded-3xl shadow-2xl p-8">
    <input id="baseUrl" type="url" placeholder="Base Long URL" class="w-full p-4 border rounded-2xl mb-6">

    <div id="blocks"></div>

    <div class="flex gap-4 mt-8">
      <button onclick="addBlock()" class="flex-1 py-4 border-2 border-dashed rounded-2xl font-bold">+ Add UTM + Images</button>
      <button onclick="generateLinks()" class="flex-1 bg-gradient-to-r from-pink-600 to-purple-600 text-white py-4 rounded-2xl font-bold">Generate TinyURLs</button>
    </div>
  </div>

  <div id="results" class="mt-10"></div>
</div>

<script>
const TINY_TOKEN = "sBiOHaC6NR5Qlm1IM2DgxzwvLZoP7Lw01BOCnjTzXlCQdYgli4XrhsrWkwCj";

async function createTinyURL(url) {
  try {
    const res = await fetch("https://api.tinyurl.com/create", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TINY_TOKEN}` },
      body: JSON.stringify({ url: url })
    });
    const data = await res.json();
    return data.data.tiny_url;
  } catch(e) {
    return "Error";
  }
}

function addBlock() {
  const div = document.createElement('div');
  div.className = "p-6 bg-gray-50 rounded-3xl border mb-6";
  div.innerHTML = `
    <input type="text" placeholder="UTM Medium" class="utm w-full p-4 rounded-2xl border mb-4">
    <textarea rows="4" placeholder="Image URLs (one per line)" class="images w-full p-4 rounded-2xl border"></textarea>
  `;
  document.getElementById('blocks').appendChild(div);
}

async function generateLinks() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  if (!baseUrl) return alert("Base URL daalein!");

  let html = `<h2 class="text-2xl font-bold text-white mb-6">✅ Generated TinyURLs</h2>`;

  document.querySelectorAll('#blocks > div').forEach(async block => {
    const utm = block.querySelector('.utm').value.trim();
    const images = block.querySelector('.images').value.trim().split('\n').filter(Boolean);

    if (utm && images.length) {
      html += `<div class="bg-white p-6 rounded-3xl mb-8">
        <h3 class="font-bold mb-4">UTM: ${utm}</h3>`;

      for (let img of images) {
        const short = await createTinyURL(baseUrl);
        html += `
          <div class="flex gap-4 items-center bg-gray-50 p-4 rounded-2xl mb-4">
            <img src="${img}" class="w-24 h-24 object-cover rounded-xl">
            <div>
              <a href="\( {short}" target="_blank" class="text-blue-600 font-medium"> \){short}</a>
            </div>
          </div>`;
      }
      html += `</div>`;
      document.getElementById('results').innerHTML = html;
    }
  });
}

window.onload = addBlock;
</script>
</body>
</html>
